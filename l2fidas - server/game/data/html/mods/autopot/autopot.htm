<html>
<head><title>Autopotions Configuration</title></head>
<body>
  <br>
  <center>
    <table width="265">
      <tr>
        <td align="center" valign="top">Currendly Auto Potions are <font color="FF6600">%acc_autopot_status%</font></td>
      </tr>
    </table>
    <br>
    <img src="l2ui.SquareGray" width=260 height=1><br1>
  </center>
  <br><br> 
  <center> 
    <table width="265" cellpadding="5">
      <tr>
        <td align="right" width="105">
          HP (%acc_autopot_hp%)
        </td>
        <td align="center">
          <edit var="hp" width=25>
        </td>
        <td align="left">
          <button value="Set" action="bypass -h voice .sethp $hp" width="35" height="26" back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
        </td>
        <td align="left">
          <button value="Disable (HP)" action="bypass -h voice .disablehp" width="85" height="26" back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
        </td>
      </tr>
      <tr>
        <td align="right" width="105">
          MP (%acc_autopot_mp%)
        </td>
        <td align="center">
          <edit var="mp" width=25>
        </td>
        <td align="left">
          <button value="Set" action="bypass -h voice .setmp $mp" width="35" height="26" back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
        </td>
        <td align="left">
          <button value="Disable (MP)" action="bypass -h voice .disablemp" width="85" height="26" back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
        </td>
      </tr>
      <tr>
        <td align="right" width="105">
          CP (%acc_autopot_cp%)
        </td>
        <td align="center">
          <edit var="cp" width=25>
        </td>
        <td align="left">
          <button value="Set" action="bypass -h voice .setcp $cp" width="35" height="26" back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
        </td>
        <td align="left">
          <button value="Disable (CP)" action="bypass -h voice .disablecp" width="85" height="26" back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
        </td>
      </tr>
    </table>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    <img src="l2ui.SquareGray" width="260" height="1"><br1>
    <table width="278" cellpadding="3" bgcolor="303030">
    <tr>    
      <td align="center">
        <button value="Enable" action="bypass -h voice .enableautopotion $hp $mp $cp" width="75" height="26" back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
      </td>        
      <td align="center">
        <button value="Disable" action="bypass -h voice .disableautopotion $hp $mp $cp" width="75" height="26" back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
      </td>        
    </tr>    
    </table>
  </center>
</body>
</html>
