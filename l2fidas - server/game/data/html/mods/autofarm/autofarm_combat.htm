<html>
<body>
<center>
  <br>
  <img src="L2UI_CT1.Windows_DF_Header_bg" width=256 height=32>
  <table width=256 bgcolor="#000000">
    <tr><td align=center height=6></td></tr>
    <tr>
      <td align=center>
        <font color="LEVEL">&#9876; Skills de Combate &#9876;</font>
      </td>
    </tr>
    <tr><td align=center height=2></td></tr>
    <tr>
      <td align=center>
        <font color="808080">(Guerrero / Mago)</font>
      </td>
    </tr>
    <tr><td align=center height=6></td></tr>
  </table>

  <img src="L2UI_CT1.Windows_DF_TooltipBg" width=256 height=2>
  <br>

  <table width=256 bgcolor="#000000">
    <tr><td height=6></td></tr>
    <tr>
      <td align=center>
        <font color="B09878">Haz click en un slot y luego usa la skill en tu barra</font>
      </td>
    </tr>
    <tr><td height=8></td></tr>

    <!-- Skill Slot 1 -->
    <tr>
      <td width=40 align=center>
        <button action="bypass -h voice .selectskill slot1" width=32 height=32 back="%slot1_icon%" fore="%slot1_icon%">
      </td>
      <td>
        <font color="LEVEL">Slot 1:</font> <font color="B09878">%slot1_name%</font>
      </td>
      <td width=50 align=right>
        <button value="X" action="bypass -h voice .clearskill slot1" width=22 height=22 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
      </td>
    </tr>
    <tr><td height=4></td></tr>

    <!-- Skill Slot 2 -->
    <tr>
      <td width=40 align=center>
        <button action="bypass -h voice .selectskill slot2" width=32 height=32 back="%slot2_icon%" fore="%slot2_icon%">
      </td>
      <td>
        <font color="LEVEL">Slot 2:</font> <font color="B09878">%slot2_name%</font>
      </td>
      <td width=50 align=right>
        <button value="X" action="bypass -h voice .clearskill slot2" width=22 height=22 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
      </td>
    </tr>
    <tr><td height=4></td></tr>

    <!-- Skill Slot 3 -->
    <tr>
      <td width=40 align=center>
        <button action="bypass -h voice .selectskill slot3" width=32 height=32 back="%slot3_icon%" fore="%slot3_icon%">
      </td>
      <td>
        <font color="LEVEL">Slot 3:</font> <font color="B09878">%slot3_name%</font>
      </td>
      <td width=50 align=right>
        <button value="X" action="bypass -h voice .clearskill slot3" width=22 height=22 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
      </td>
    </tr>
    <tr><td height=4></td></tr>

    <!-- Skill Slot 4 -->
    <tr>
      <td width=40 align=center>
        <button action="bypass -h voice .selectskill slot4" width=32 height=32 back="%slot4_icon%" fore="%slot4_icon%">
      </td>
      <td>
        <font color="LEVEL">Slot 4:</font> <font color="B09878">%slot4_name%</font>
      </td>
      <td width=50 align=right>
        <button value="X" action="bypass -h voice .clearskill slot4" width=22 height=22 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
      </td>
    </tr>
    <tr><td height=8></td></tr>

    <img src="L2UI_CT1.Windows_DF_TooltipBg" width=240 height=1>
    <tr><td height=6></td></tr>

    <!-- Random toggle -->
    <tr>
      <td width=20 align=right>
        <button value=" " action="bypass -h voice .togglerandomskills" width=16 height=16 back="%random_check%" fore="%random_check%">
      </td>
      <td colspan=2>Usar Skills en Orden Aleatorio</td>
    </tr>
    <tr><td height=8></td></tr>

    <!-- Navigation -->
    <tr>
      <td colspan=3 align=center>
        <button value="&#9664; Volver" action="bypass -h voice .autofarm" width=90 height=24 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df">
      </td>
    </tr>
    <tr><td height=6></td></tr>
  </table>

</center>
</body>
</html>
