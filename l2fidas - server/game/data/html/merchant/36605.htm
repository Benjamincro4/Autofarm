<br>
<font name="hs12">DressMe Service</font>
<br><br>

This NPC provides visual skins and character<br1>
services.<br1>
Armor skins only change appearance (no stats).<br1>
All changes apply to the current character.<br1>
Skins are unlocked for the whole account.<br1><br><br>
Requires <font color="LEVEL">L2Fidas Coin</font>.
<br><br>

action="bypass -h dressme armors"

fore="L2UI_ct1.button_df">
