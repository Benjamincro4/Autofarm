############################################################
#  	Global properties
############################################################

# "handlers" specifies a comma separated list of log Handler 
# classes.  These handlers will be installed during VM startup.
# Note that these classes must be on the system classpath.
# By default we only configure a ConsoleHandler, which will only
# show messages at the INFO and above levels.
#handlers= java.util.logging.ConsoleHandler

# To also add the FileHandler, use the following line instead.
handlers = java.util.logging.FileHandler,\
		java.util.logging.ConsoleHandler,\
		fidas.server.log.handler.ErrorLogHandler
chat.handlers = fidas.server.log.handler.ChatLogHandler
chat.useParentHandlers = false
gmaudit.handlers = fidas.server.log.handler.GMAuditLogHandler
gmaudit.useParentHandlers = false
item.handlers = fidas.server.log.handler.ItemLogHandler
item.useParentHandlers = false
audit.handlers = fidas.server.log.handler.AuditLogHandler
audit.useParentHandlers = false
enchant.handlers = fidas.server.log.handler.EnchantItemLogHandler,\
		fidas.server.log.handler.EnchantSkillLogHandler
enchant.useParentHandlers = false
olympiad.handlers = fidas.server.log.handler.OlympiadLogHandler
olympiad.useParentHandlers = false
damage.handlers = fidas.server.log.handler.AllDamageLogHandler,\
		fidas.server.log.handler.PDamageLogHandler,\
		fidas.server.log.handler.MDamageLogHandler
damage.useParentHandlers = false
accounting.handlers = fidas.server.log.handler.AccountingLogHandler
accounting.useParentHandlers = false

# Default global logging level.
# This specifies which kinds of events are logged across
# all loggers.  For any given facility this global level
# can be overriden by a facility specific level
# Note that the ConsoleHandler also has a separate level
# setting to limit messages printed to the console.
.level= CONFIG

############################################################
# Handler specific properties.
# Describes specific configuration info for Handlers.
############################################################

# default file output is in user's home directory.
java.util.logging.FileHandler.pattern = log/java%g.log
java.util.logging.FileHandler.count = 20
java.util.logging.FileHandler.limit = 0
java.util.logging.FileHandler.formatter = fidas.server.log.formatter.FileLogFormatter
java.util.logging.FileHandler.level = CONFIG

# Limit the message that are printed on the console to INFO and above.
java.util.logging.ConsoleHandler.level = FINER
java.util.logging.ConsoleHandler.formatter = fidas.server.log.formatter.ConsoleLogFormatter

# log errors (exceptions)
fidas.server.log.handler.ErrorLogHandler.pattern = log/error%g.log
fidas.server.log.handler.ErrorLogHandler.count = 20
fidas.server.log.handler.ErrorLogHandler.limit = 0
fidas.server.log.handler.ErrorLogHandler.formatter = java.util.logging.SimpleFormatter
fidas.server.log.handler.ErrorLogHandler.filter = fidas.server.log.filter.ErrorFilter
fidas.server.log.handler.ErrorLogHandler.level = CONFIG

# log chats
fidas.server.log.handler.ChatLogHandler.pattern = log/chat.log
fidas.server.log.handler.ChatLogHandler.formatter = fidas.server.log.formatter.ChatLogFormatter
fidas.server.log.handler.ChatLogHandler.filter = fidas.server.log.filter.ChatFilter
fidas.server.log.handler.ChatLogHandler.append = true
fidas.server.log.handler.ChatLogHandler.level = INFO

# log GM Audit
fidas.server.log.handler.GMAuditLogHandler.pattern = log/gmaudit.log
fidas.server.log.handler.GMAuditLogHandler.formatter = fidas.server.log.formatter.GMAuditFormatter
fidas.server.log.handler.GMAuditLogHandler.filter = fidas.server.log.filter.GMAuditFilter
fidas.server.log.handler.GMAuditLogHandler.append = true
fidas.server.log.handler.GMAuditLogHandler.level = INFO

# log items
fidas.server.log.handler.ItemLogHandler.pattern = log/item.log
fidas.server.log.handler.ItemLogHandler.formatter = fidas.server.log.formatter.ItemLogFormatter
fidas.server.log.handler.ItemLogHandler.filter = fidas.server.log.filter.ItemFilter
fidas.server.log.handler.ItemLogHandler.append = true
fidas.server.log.handler.ItemLogHandler.level = INFO

# audit
fidas.server.log.handler.AuditLogHandler.pattern = log/audit.log
fidas.server.log.handler.AuditLogHandler.formatter = fidas.server.log.formatter.AuditFormatter
fidas.server.log.handler.AuditLogHandler.filter = fidas.server.log.filter.AuditFilter
fidas.server.log.handler.AuditLogHandler.append = true
fidas.server.log.handler.AuditLogHandler.level = INFO

# enchant item log
fidas.server.log.handler.EnchantItemLogHandler.pattern = log/enchantitem.log
fidas.server.log.handler.EnchantItemLogHandler.formatter = fidas.server.log.formatter.EnchantFormatter
fidas.server.log.handler.EnchantItemLogHandler.filter = fidas.server.log.filter.EnchantItemFilter
fidas.server.log.handler.EnchantItemLogHandler.append = true
fidas.server.log.handler.EnchantItemLogHandler.level = INFO

# enchant skill log
fidas.server.log.handler.EnchantSkillLogHandler.pattern = log/enchantskill.log
fidas.server.log.handler.EnchantSkillLogHandler.formatter = fidas.server.log.formatter.EnchantFormatter
fidas.server.log.handler.EnchantSkillLogHandler.filter = fidas.server.log.filter.EnchantSkillFilter
fidas.server.log.handler.EnchantSkillLogHandler.append = true
fidas.server.log.handler.EnchantSkillLogHandler.level = INFO

# olympiad log
fidas.server.log.handler.OlympiadLogHandler.pattern = log/olympiad.csv
fidas.server.log.handler.OlympiadLogHandler.formatter = fidas.server.log.formatter.OlympiadFormatter
fidas.server.log.handler.OlympiadLogHandler.append = true
fidas.server.log.handler.OlympiadLogHandler.level = INFO

# damage logs
fidas.server.log.handler.AllDamageLogHandler.pattern = log/game/_all.txt
fidas.server.log.handler.AllDamageLogHandler.formatter = fidas.server.log.formatter.DamageFormatter
fidas.server.log.handler.AllDamageLogHandler.append = true
fidas.server.log.handler.AllDamageLogHandler.level = INFO

fidas.server.log.handler.PDamageLogHandler.pattern = log/game/damage_pdam.txt
fidas.server.log.handler.PDamageLogHandler.formatter = fidas.server.log.formatter.DamageFormatter
fidas.server.log.handler.PDamageLogHandler.filter = fidas.server.log.filter.PDamageFilter
fidas.server.log.handler.PDamageLogHandler.append = true
fidas.server.log.handler.PDamageLogHandler.level = INFO

fidas.server.log.handler.MDamageLogHandler.pattern = log/game/damage_mdam.txt
fidas.server.log.handler.MDamageLogHandler.formatter = fidas.server.log.formatter.DamageFormatter
fidas.server.log.handler.MDamageLogHandler.filter = fidas.server.log.filter.MDamageFilter
fidas.server.log.handler.MDamageLogHandler.append = true
fidas.server.log.handler.MDamageLogHandler.level = INFO

# accounting
fidas.server.log.handler.AccountingLogHandler.pattern = log/accounting.log
fidas.server.log.handler.AccountingLogHandler.formatter = fidas.server.log.filter.AccountingFormatter
fidas.server.log.handler.AccountingLogHandler.append = true
fidas.server.log.handler.AccountingLogHandler.level = CONFIG

############################################################
# Facility specific properties.
# Provides extra control for each logger.
############################################################

# For example, set the com.xyz.foo logger to only log SEVERE
# messages:
fidas.server.gameserver.level = CONFIG
fidas.server.loginserver.level = CONFIG
#fidas.server.gameserver.Connection.level = CONFIG
fidas.server.gameserver.network.serverpackets.level = FINER
fidas.server.gameserver.network.clientpackets.level = FINER
fidas.server.gameserver.model.actor.L2Character.level = FINER
fidas.server.gameserver.engines.DocumentEngine.level = INFO

# Alt Privileges Administration
AltPrivilegesAdmin.pattern = log/admin-commands.log
AltPrivilegesAdmin.formatter = fidas.server.log.formatter.FileLogFormatter
AltPrivilegesAdmin.append = true
AltPrivilegesAdmin.level = CONFIG

# c3p0 Logging
com.mchange.v2.level = WARNING